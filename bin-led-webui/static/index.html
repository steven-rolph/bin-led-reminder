<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bin LED Reminder</title>
  <link rel="stylesheet" href="/static/pico.min.css" />
  <style>
    body { max-width: 900px; margin: 0 auto; padding: 1rem; }
    .status-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    .bin-dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
    }
    .log-line { font-family: monospace; font-size: 0.8rem; margin: 0; }
    .log-error { color: var(--colour-error, #ef4444); }
    .log-container {
      max-height: 300px;
      overflow-y: auto;
      background: var(--pico-code-background-color, var(--colour-log-bg, #1a1a2e));
      padding: 0.75rem;
      border-radius: 4px;
    }
    .days-badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--pico-secondary-background);
      color: var(--colour-days-badge, #e5e7eb);
      margin-left: 6px;
    }
    .error-banner {
      background: var(--colour-error-banner-bg, #fee2e2);
      color: var(--colour-error-banner-fg, #991b1b);
      border: 1px solid var(--colour-error-banner-border, #fca5a5);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
    }
    .led-strip {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      justify-content: center;
      align-items: center;
    }
    .led-square {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      background-color: var(--colour-led-off, #374151);
      transition: background-color 0.3s, box-shadow 0.3s, opacity 0.3s;
    }
    .btn-sm {
      font-size: 0.8rem;
      padding: 0.25rem 0.6rem;
    }
    .led-mini {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: background-color 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .test-led-label {
      font-size: 0.75rem;
      color: var(--pico-muted-color, var(--colour-bin-black-bag, #6b7280));
      margin: 0.75rem 0 0.25rem;
    }
    button.outline { margin-right: 0.5rem; }
    button.tooltip-help {
      display: inline;
      padding: 0;
      margin: 0 0 0 2px;
      border: none;
      background: none;
      font-size: 0.75rem;
      color: var(--pico-muted-color);
      cursor: help;
      vertical-align: super;
    }
    main > article {
      margin-bottom: 2rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
